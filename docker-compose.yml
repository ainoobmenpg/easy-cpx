version: "3.8"

services:
  db:
    image: postgres:15-alpine
    container_name: cpx-db
    environment:
      POSTGRES_USER: cpx
      POSTGRES_PASSWORD: cpx_password
      POSTGRES_DB: cpx
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cpx"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: cpx-backend
    environment:
      DATABASE_URL: postgresql://cpx:cpx_password@db:5432/cpx
      MINIMAX_API_KEY: ${MINIMAX_API_KEY:-dummy-api-key}
      MINIMAX_BASE_URL: https://api.minimax.chat/v1
      ENABLE_INTERNAL_ENDPOINTS: "false"
      CORS_ORIGINS: http://localhost:3000
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: cpx-frontend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    command: npm run dev

volumes:
  postgres_data:
